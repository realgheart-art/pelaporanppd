<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pelaporan Bimbingan SISC+ · JPN Kedah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.13.7/css/jquery.dataTables.min.css">
<style>
:root{
  --ink:#0e1b34;--navy:#16294d;--navy-2:#1f355f;--brass:#b98a3e;--brass-2:#d7b26b;
  --paper:#f4efe4;--paper-2:#eae2d1;--card:#fffdf8;--text:#182338;--muted:#6f6a5a;--line:#d9cfba;
  --green:#2f7d4f;--gbg:#e4f0e6;--red:#b3402f;--rbg:#f7e7e2;--amber:#c1852a;--abg:#fdf0dc;
  --r:14px;--sh:0 12px 34px -18px rgba(14,27,52,.45);
}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--text);font-family:'Plus Jakarta Sans',system-ui,sans-serif;line-height:1.5}
.ew{font-size:.67rem;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);font-weight:700}
.wrap{max-width:1160px;margin:0 auto;padding:0 16px}
.hidden{display:none!important}

/* LOGIN */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,var(--ink),var(--navy) 75%);position:relative;overflow:hidden}
#ls::after{content:"";position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0 46px,rgba(215,178,107,.05) 46px 47px);pointer-events:none}
.lcard{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--brass);border-radius:18px;
  box-shadow:0 30px 70px -25px rgba(0,0,0,.6);width:100%;max-width:390px;padding:28px 26px;position:relative;z-index:1}
.llogo{display:block;width:108px;height:108px;border-radius:50%;object-fit:cover;margin:0 auto 6px;
  box-shadow:0 0 0 3px rgba(185,138,62,.4),0 12px 26px -12px rgba(0,0,0,.5)}
.ltag{text-align:center;font-family:'Fraunces',serif;font-style:italic;color:var(--brass);font-size:.8rem;margin:0 0 14px;line-height:1.3}
.lsub{text-align:center;color:var(--muted);font-size:.8rem;margin:0 0 18px}
.lcard label{display:block;font-size:.79rem;font-weight:600;margin:0 0 5px}
.lcard input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:.9rem;margin-bottom:12px}
.lcard input:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(185,138,62,.16)}
.lbtn{width:100%;border:none;border-radius:11px;padding:13px;font-family:inherit;font-weight:700;cursor:pointer;
  color:#0e1b34;background:linear-gradient(120deg,var(--brass-2),var(--brass));box-shadow:0 8px 20px -10px rgba(185,138,62,.7)}
.lerr{color:var(--red);font-size:.78rem;text-align:center;margin:8px 0 0;min-height:1.1em}
.dbox{margin-top:18px;border-top:1px dashed var(--line);padding-top:12px}
.dbox p{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin:0 0 7px;text-align:center}
.dchips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.dchip{font-size:.71rem;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:4px 10px;cursor:pointer;transition:all .12s;white-space:nowrap}
.dchip:hover{border-color:var(--brass);background:#fff}
.dchip b{color:var(--navy)}

/* TOPBAR */
.topbar{background:linear-gradient(160deg,var(--ink),var(--navy) 72%);color:#f4efe4;border-bottom:3px solid var(--brass);padding:11px 0}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px}
.bwrap{display:flex;align-items:center;gap:10px}
.tblogo{width:38px;height:38px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px rgba(215,178,107,.45);flex:none}
.brand .t{font-family:'Fraunces',serif;font-weight:600;font-size:.98rem;display:block;line-height:1.15}
.brand .s{font-size:.66rem;color:var(--brass-2);letter-spacing:.08em;text-transform:uppercase;display:block}
.ubox{display:flex;align-items:center;gap:10px}
.uinfo{text-align:right;line-height:1.2}
.uinfo .n{font-weight:600;font-size:.83rem}
.uinfo .r{font-size:.68rem;color:#c9d2e4}
.lout{background:rgba(215,178,107,.15);border:1px solid rgba(215,178,107,.4);color:var(--brass-2);border-radius:9px;
  padding:6px 11px;font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer}
.lout:hover{background:rgba(215,178,107,.25)}

/* SHELL */
.banner{background:var(--paper-2);border-bottom:1px solid var(--line)}
.banner .wrap{padding:14px 16px}
.banner h2{font-family:'Fraunces',serif;font-weight:600;margin:0;font-size:1.18rem}
.banner p{margin:2px 0 0;font-size:.8rem;color:var(--muted)}
section{margin-top:20px}
.stitle{display:flex;align-items:baseline;gap:10px;margin:0 0 11px;flex-wrap:wrap}
.stitle h3{font-family:'Fraunces',serif;font-weight:600;font-size:1.1rem;margin:0}
.stitle .note{font-size:.76rem;color:var(--muted)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 15px 13px;box-shadow:var(--sh);position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--brass)}
.stat.good::before{background:var(--green)}.stat.warn::before{background:var(--red)}
.stat .lbl{font-size:.7rem;color:var(--muted);font-weight:600}
.stat .num{font-family:'Fraunces',serif;font-weight:600;font-size:1.9rem;line-height:1.05;margin:5px 0 2px}
.stat .num.sm{font-size:1.05rem;line-height:1.3}
.stat .num small{font-size:.9rem;color:var(--muted)}
.stat .sub{font-size:.72rem;color:var(--muted)}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.71rem;font-weight:600;white-space:nowrap}
.bsel{background:var(--gbg);color:var(--green)}.btind{background:var(--abg);color:var(--amber)}.btan{background:var(--rbg);color:var(--red)}
.bnew{background:#e8eef8;color:#2a4a8a}

/* SEKTOR GRID */
.skgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px}
.skcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:14px 14px 12px;cursor:pointer;transition:transform .1s,border-color .15s}
.skcard:hover{transform:translateY(-2px);border-color:var(--brass)}
.skcard.active{border-color:var(--brass);box-shadow:0 0 0 2px rgba(185,138,62,.3),var(--sh)}
.skcard .skn{font-weight:600;font-size:.88rem;line-height:1.3;min-height:2.3em}
.skcard .skc{font-family:'Fraunces',serif;font-weight:600;font-size:1.8rem;color:var(--navy);line-height:1;margin:7px 0 3px}
.skcard .skc small{font-size:.78rem;color:var(--muted);font-family:'Plus Jakarta Sans'}
.skbar{display:flex;height:7px;border-radius:5px;overflow:hidden;margin-top:8px;background:var(--paper-2)}
.skbar i{display:block;height:100%}
.skleg{display:flex;gap:10px;font-size:.67rem;color:var(--muted);margin-top:6px;flex-wrap:wrap}
.skleg b{font-weight:600}

/* LEDGER */
.lfwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card);box-shadow:var(--sh)}
table.lf{border-collapse:separate;border-spacing:0;width:100%;font-size:.82rem}
.lf th,.lf td{padding:0;text-align:center}
.lf thead th{background:var(--navy);color:#e6ded0;font-weight:600;font-size:.7rem;padding:10px 6px;position:sticky;top:0;z-index:3;border-bottom:2px solid var(--brass)}
.lf thead th.cn{left:0;z-index:5;text-align:left;padding-left:14px;min-width:180px}
.lf thead th.wk{min-width:52px}.lf thead th.wk.cur{background:var(--navy-2);color:var(--brass-2)}
.lf tbody td.nm{position:sticky;left:0;z-index:2;background:var(--card);text-align:left;padding:9px 10px 9px 14px;
  border-bottom:1px solid var(--line);border-right:2px solid var(--brass);font-weight:600;white-space:nowrap}
.lf tbody td.cl{border-bottom:1px solid var(--line);border-right:1px solid #ece4d3;height:46px;min-width:52px;vertical-align:middle}
.lf tbody td.cl.cur{background:rgba(215,178,107,.06)}
.lcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%}
.lmark{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:.72rem;font-weight:700}
.lmark.ok{background:var(--gbg);color:var(--green);cursor:pointer;transition:transform .1s}.lmark.ok:hover{transform:scale(1.15)}
.lmark.no{background:transparent;color:var(--line)}.cl.cur .lmark.no{background:var(--rbg);color:var(--red)}
.isuc{font-size:.58rem;color:var(--muted);line-height:1}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:.74rem;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend .sw{width:15px;height:15px;border-radius:4px;display:inline-block}
.chart-box{position:relative;height:250px}

/* BORANG */
.field{margin-bottom:15px}
.field label{display:block;font-weight:600;font-size:.82rem;margin-bottom:5px}
.field label .req{color:var(--red)}
.field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:.9rem;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--text)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(185,138,62,.16)}
.field textarea{resize:vertical;min-height:58px}
.rowg{display:grid;grid-template-columns:1fr 1fr;gap:13px}@media(max-width:520px){.rowg{grid-template-columns:1fr}}
.idstrip{background:var(--navy);color:#e6ded0;border-radius:11px;padding:13px 15px;display:flex;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.idstrip .k{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--brass-2)}
.idstrip .v{font-weight:600;font-size:.9rem}
.mchip{display:flex;align-items:center;gap:11px;margin-top:8px;background:linear-gradient(120deg,var(--navy),var(--navy-2));color:#f4efe4;border-radius:10px;padding:10px 13px;border:1px solid var(--brass)}
.mchip .big{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;color:var(--brass-2);min-width:2ch;text-align:center}
.mchip .ml{font-size:.69rem;text-transform:uppercase;letter-spacing:.07em;color:#c9d2e4}
.mchip .ms{font-size:.79rem;color:#e6ded0}
.irow{border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:12px;padding:13px 13px 3px;margin-bottom:11px;background:#fffefb;position:relative}
.irow .rn{position:absolute;top:-8px;left:11px;background:var(--brass);color:#0e1b34;font-size:.64rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 9px;border-radius:999px}
.irow .rm{position:absolute;top:9px;right:9px;width:25px;height:25px;border:none;border-radius:7px;background:var(--rbg);color:var(--red);font-size:1rem;font-weight:700;cursor:pointer;line-height:1;display:none}
.addbtn{width:100%;border:1.5px dashed var(--brass);background:rgba(185,138,62,.06);color:var(--brass);font-family:inherit;font-weight:600;font-size:.86rem;padding:10px;border-radius:11px;cursor:pointer;margin-bottom:14px}
.addbtn:hover{background:rgba(185,138,62,.12)}
.btnp{width:100%;font-family:inherit;font-weight:700;font-size:.93rem;color:#0e1b34;background:linear-gradient(120deg,var(--brass-2),var(--brass));border:none;border-radius:11px;padding:13px;cursor:pointer;box-shadow:0 8px 20px -10px rgba(185,138,62,.7)}
.btnp:active{transform:translateY(1px)}.btnp:disabled{filter:grayscale(.5) opacity(.7)}

/* TRIAGE */
.triage-wrap{overflow-x:auto}
.trtable{width:100%;border-collapse:collapse;font-size:.83rem}
.trtable th{text-align:left;background:var(--navy);color:#e6ded0;padding:10px 12px;font-weight:600;font-size:.73rem;position:sticky;top:0}
.trtable td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.trtable tr:hover td{background:var(--paper)}
.trtable select{font-family:inherit;font-size:.79rem;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;max-width:220px;width:100%}
.trtable select.unset{border-color:var(--amber);background:var(--abg)}
.sm{font-size:.71rem;color:var(--muted)}
.sf{color:var(--green);font-size:.7rem;font-weight:600;opacity:0;transition:opacity .2s}
.sf.show{opacity:1}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.67rem;font-weight:600;background:var(--navy);color:#e6ded0}

/* SEJARAH */
.rep{border:1px solid var(--line);border-radius:12px;margin-bottom:9px;overflow:hidden;background:#fff}
.rep summary{cursor:pointer;padding:11px 14px;font-weight:600;font-size:.87rem;display:flex;justify-content:space-between;align-items:center;gap:10px;list-style:none}
.rep summary::-webkit-details-marker{display:none}
.rep summary .sm{font-size:.73rem;color:var(--muted);font-weight:400}
.rep .rbody{padding:0 14px 11px;border-top:1px solid var(--line)}
.mi{border-left:3px solid var(--brass);padding:2px 0 2px 11px;margin:11px 0}
.mi .miu{font-weight:600;font-size:.87rem}
.mi .mii{font-size:.82rem;margin-top:2px}
.mi .mim{font-size:.7rem;color:var(--muted);margin-top:4px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.wpills{display:flex;flex-wrap:wrap;gap:5px}
.wpill{width:32px;height:28px;border-radius:7px;display:grid;place-items:center;font-size:.7rem;font-weight:600;border:1px solid var(--line)}
.wpill.ok{background:var(--gbg);color:var(--green);border-color:var(--green)}
.wpill.no{background:var(--rbg);color:var(--red);border-color:var(--red)}

/* DATATABLES */
#tbl,#tblMeja{width:100%!important;font-size:.83rem}
table.dataTable thead th{font-weight:600;color:var(--navy);border-bottom:2px solid var(--brass)!important}
.dataTables_wrapper .dataTables_filter input{border:1px solid var(--line);border-radius:8px;padding:6px 10px}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:end;margin-bottom:13px}
.filters .f{display:flex;flex-direction:column;gap:4px}
.filters label{font-size:.7rem;font-weight:600;color:var(--muted)}
.filters select{font-family:inherit;font-size:.84rem;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:#fff;min-width:140px}
.filters select:focus{outline:none;border-color:var(--brass);box-shadow:0 0 0 3px rgba(185,138,62,.16)}

/* ADMIN */
.tabs{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--card);border-radius:10px;padding:8px 15px;font-family:inherit;font-weight:600;font-size:.82rem;cursor:pointer}
.tab.active{background:var(--navy);color:#f4efe4;border-color:var(--navy)}
.utable{width:100%;border-collapse:collapse;font-size:.83rem}
.utable th{text-align:left;background:var(--paper-2);padding:9px 12px;font-weight:600;font-size:.72rem;border-bottom:2px solid var(--brass)}
.utable td{padding:9px 12px;border-bottom:1px solid var(--line)}
.rl{font-size:.67rem;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--paper-2);color:var(--navy)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(14,27,52,.55);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--brass);border-radius:16px;max-width:500px;width:100%;box-shadow:0 30px 60px -20px rgba(0,0,0,.5);overflow:hidden}
.mhd{background:linear-gradient(160deg,var(--ink),var(--navy));color:#f4efe4;padding:15px 19px;border-bottom:2px solid var(--brass)}
.mhd .ew{color:var(--brass-2)}.mhd h3{font-family:'Fraunces',serif;font-weight:600;margin:.2rem 0 0;font-size:1.08rem}
.mbd{padding:16px 19px;max-height:60vh;overflow-y:auto}
.mft{padding:11px 19px 17px}.mft button{width:100%;padding:10px;border:1px solid var(--line);background:var(--paper);border-radius:10px;font-family:inherit;font-weight:600;cursor:pointer}
.mft button:hover{background:var(--paper-2)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(140%);background:var(--navy);color:#f4efe4;
  padding:13px 18px;border-radius:12px;border:1px solid var(--brass);box-shadow:var(--sh);font-size:.88rem;z-index:70;
  transition:transform .35s cubic-bezier(.2,.9,.3,1.2);max-width:90vw;display:flex;align-items:center;gap:9px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .tk{width:21px;height:21px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:.78rem;flex:none}
/* Sidebar sektor */
.sbov{position:fixed;inset:0;background:rgba(14,27,52,.5);z-index:65;opacity:0;pointer-events:none;transition:opacity .25s}
.sbov.show{opacity:1;pointer-events:auto}
.sbar{position:fixed;top:0;right:0;height:100%;width:min(460px,92vw);background:var(--paper);z-index:66;
  box-shadow:-20px 0 50px -20px rgba(0,0,0,.5);transform:translateX(100%);transition:transform .3s cubic-bezier(.3,.9,.3,1);
  display:flex;flex-direction:column}
.sbar.show{transform:translateX(0)}
.sbhd{background:linear-gradient(160deg,var(--ink),var(--navy));color:#f4efe4;padding:18px 20px;border-bottom:3px solid var(--brass);position:relative;flex:none}
.sbhd .ew{color:var(--brass-2)}
.sbhd h3{font-family:'Fraunces',serif;font-weight:600;margin:.25rem 0 0;font-size:1.15rem;padding-right:34px;line-height:1.2}
.sbhd .sbx{position:absolute;top:16px;right:16px;width:30px;height:30px;border:none;border-radius:8px;background:rgba(215,178,107,.2);color:var(--brass-2);font-size:1.1rem;cursor:pointer;line-height:1}
.sbhd .sbx:hover{background:rgba(215,178,107,.35)}
.sbstat{display:flex;gap:8px;padding:12px 20px;background:var(--paper-2);border-bottom:1px solid var(--line);flex:none;flex-wrap:wrap}
.sbstat .sc{flex:1;min-width:70px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 4px}
.sbstat .sc .n{font-family:'Fraunces',serif;font-weight:600;font-size:1.3rem;line-height:1}
.sbstat .sc .l{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.sbbody{overflow-y:auto;padding:14px 16px;flex:1}
.sbfilter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sbfilter button{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5px 12px;font-family:inherit;font-size:.74rem;font-weight:600;cursor:pointer;color:var(--muted)}
.sbfilter button.on{background:var(--navy);color:#f4efe4;border-color:var(--navy)}
.sbitem{border:1px solid var(--line);border-left:4px solid var(--brass);border-radius:11px;background:var(--card);padding:12px 13px;margin-bottom:10px}
.sbitem .top{display:flex;justify-content:space-between;gap:8px;align-items:start;margin-bottom:6px}
.sbitem .isu{font-weight:600;font-size:.87rem;line-height:1.3}
.sbitem .int{font-size:.82rem;color:var(--text);margin:3px 0 7px}
.sbitem .int b{color:var(--brass);font-weight:600}
.sbitem .meta{font-size:.72rem;color:var(--muted);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sbitem .mtag{background:var(--paper-2);padding:2px 8px;border-radius:999px}
.sbempty{text-align:center;color:var(--muted);font-size:.85rem;padding:30px 10px}
.sklist{margin:0;padding:6px 6px 6px 34px;max-height:230px;overflow-y:auto;counter-reset:none}
.sklist li{padding:7px 8px;border-bottom:1px solid var(--line);font-size:.86rem}
.sklist li:last-child{border-bottom:none}
.sklist li::marker{color:var(--brass);font-weight:600;font-size:.8rem}
.pagepad{padding-bottom:56px}
footer{text-align:center;padding:24px 16px 32px;color:var(--muted);font-size:.72rem}
.modNote{background:rgba(215,178,107,.12);border:1px solid rgba(185,138,62,.35);color:#7a5c1e;border-radius:9px;padding:8px 12px;font-size:.75rem;text-align:center;margin-bottom:16px;display:none}
.modNote.show{display:block}
</style>
</head>
<body>

function minggu(d){const s=new Date(CFG.START+'T00:00:00'),x=new Date(d+'T00:00:00');const df=Math.floor((x-s)/86400000);return df<0?0:Math.floor(df/7)+1;}
function wkDate(m){const s=new Date(CFG.START+'T00:00:00');s.setDate(s.getDate()+(m-1)*7);return s;}
const CW=minggu(new Date().toISOString().slice(0,10));
const fmtD=d=>new Date(d+'T00:00:00').toLocaleDateString('ms-MY',{day:'numeric',month:'long',year:'numeric'});
const bc=s=>s==='Selesai'?'bsel':(s==='Tertangguh'?'btan':(s==='Belum Ditetapkan'?'bnew':'btind'));
const $ =s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];

let seed=42;const rnd=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed/0x7fffffff;};
const ISU=['Item pentaksiran kurang aras HOTS','PdPc kurang berpusatkan murid','Murid TP1-2 perlu intervensi segera',
  'Guru baharu perlu bimbingan intensif','Pelaksanaan PBD tidak konsisten','Integrasi PAK21 dalam bilik darjah lemah',

const INTER=['Bimbingan susulan bersama guru terlibat','Bengkel pembinaan item panel',
  'Pemantauan PdPc berkala dua minggu','Coaching individu guru baharu','Klinik pentaksiran bilik darjah',
  'Sesi PLC panel mata pelajaran','Rujukan ke sektor berkaitan','Audit rekod berkala'];
const SEK_MAP=['Sektor Pembelajaran','Sektor Pembelajaran','Sektor Pembelajaran','Sektor Pentaksiran & Peperiksaan',
  'Sektor Pentaksiran & Peperiksaan','Sektor Pembangunan Murid','Sektor Sumber & Teknologi Pendidikan',

const STAT=['Selesai','Selesai','Dalam tindakan','Dalam tindakan','Tertangguh'];

(function buildDemo(){
  // PPD KOTA SETAR sengaja dikosongkan supaya demo login PPD bermula bersih
  // (tunjuk pengalaman sebenar PPD yang belum lapor). PPD lain ada data
  // supaya paparan S4PD & Pengurusan tetap menunjukkan keseluruhan sistem.
  const PPD_KOSONG='PPD KOTA SETAR';
  PPDS.forEach(ppd=>{
    if(ppd===PPD_KOSONG)return;
    const sk=SEKOLAH_REF.filter(s=>s.ppd===ppd);
    for(let w=1;w<=CW;w++){
      const rate=w===CW?0.7:0.85;
      if(rnd()<rate){
        const t=wkDate(w);t.setDate(t.getDate()+Math.floor(rnd()*4)+1);
        const sekolah=sk.length?sk[Math.floor(rnd()*sk.length)].nama:'';
        const rID='R'+(++rid);const n=1+Math.floor(rnd()*3);const issues=[];
        for(let k=0;k<n;k++){
          const labelled=w<CW&&rnd()<0.8;
          const tk={id:'T'+(++tid),laporanId:rID,minggu:w,ppd,tarikh:t.toISOString().slice(0,10),
            sekolah,isu:ISU[Math.floor(rnd()*ISU.length)],intervensi:INTER[Math.floor(rnd()*INTER.length)],
            sektor:labelled?SEK_MAP[Math.floor(rnd()*SEK_MAP.length)]:'',
            status:labelled?STAT[Math.floor(rnd()*STAT.length)]:'Belum Ditetapkan',catatan:''};
          issues.push(tk);TINDAKAN.push(tk);
        }
        REPORTS.push({id:rID,minggu:w,ppd,tarikh:t.toISOString().slice(0,10),sekolah,issues});
      }
    }
  });
})();
const hasRep=(ppd,w)=>REPORTS.find(r=>r.ppd===ppd&&r.minggu===w);
const belumTriage=()=>TINDAKAN.filter(t=>!t.sektor);

function fill(u,p){$('#lu').value=u;$('#lp').value=p;doLogin();}
async function doLogin(){
  const u=$('#lu').value.trim().toLowerCase(),p=$('#lp').value;
  if(!u||!p){$('#lerr').textContent='Sila isi nama pengguna dan kata laluan.';return;}
  let f=null;
  if(CFG.DEMO){
    f=USERS_DEMO.find(x=>x.u===u&&x.pin===p);
    if(!f){$('#lerr').textContent='Nama pengguna atau kata laluan salah.';return;}
  }else{
    if(!CFG.GAS){$('#lerr').textContent='Sistem belum dikonfigurasi. Sila hubungi pentadbir.';return;}
    try{
      const lbtn=$('.lbtn');lbtn.disabled=true;lbtn.textContent='Menyemak…';
      const res=await fetch(CFG.GAS,{method:'POST',body:JSON.stringify({action:'login',username:u,pin:p})});
      const d=await res.json();lbtn.disabled=false;lbtn.textContent='Log masuk';
      if(!d.ok){$('#lerr').textContent=d.error||'Log masuk gagal.';return;}
      f=d.user;
    }catch(e){$('.lbtn').disabled=false;$('.lbtn').textContent='Log masuk';$('#lerr').textContent='Gagal menghubungi pelayan. Cuba lagi.';return;}
  }
  if(!f){$('#lerr').textContent='Nama pengguna atau kata laluan salah.';return;}
  ME=f;$('#lerr').textContent='';
  $('#ls').classList.add('hidden');$('#app').classList.remove('hidden');
  $('#uName').textContent=f.nama;
  $('#uRole').textContent=ROLE_LBL[f.peranan]+(f.sektor?' · '+f.sektor.replace('Sektor ',''):'')+(f.ppd?' · '+f.ppd:'');
  const mn=$('#modNote');
  if(CFG.DEMO){mn.textContent='Mod Demo — data dijana automatik. Tukar CFG.DEMO=false selepas setup Google Sheets.';mn.classList.add('show');}
  else{mn.classList.remove('show');}
  route();
}
function doLogout(){ME=null;cleanup();$('#app').classList.add('hidden');$('#ls').classList.remove('hidden');$('#lu').value='';$('#lp').value='';}
function cleanup(){if(chI){chI.destroy();chI=null;}try{if(dtI)dtI.destroy();}catch(e){}try{if(dtM)dtM.destroy();}catch(e){}dtI=null;dtM=null;}

function vPPD(){
  const me=ME;const myR=REPORTS.filter(r=>r.ppd===me.ppd).sort((a,b)=>b.minggu-a.minggu);
  const lapor=new Set(myR.map(r=>r.minggu));
  const skOpts=SEKOLAH_REF.filter(s=>s.ppd===me.ppd).sort((a,b)=>a.nama.localeCompare(b.nama,'ms')).map(s=>`<option value="${s.nama}">${s.nama}</option>`).join('');
  let pills='';for(let w=1;w<=CW;w++)pills+=`<div class="wpill ${lapor.has(w)?'ok':'no'}">${w}</div>`;
  const dibimbing=[...new Set(myR.map(r=>r.sekolah).filter(Boolean))];
  const sekOpt='<option value="">Pilih sektor bertanggungjawab (pilihan)…</option>'+SEKTOR.map(s=>`<option>${s}</option>`).join('');

  $('#vroot').innerHTML=`
  <div class="banner"><div class="wrap"><h2>${me.ppd}</h2><p>Sistem Pelaporan Dialog Bimbingan SISC+</p></div></div>
  <div class="wrap">
    <section><div class="stats" id="pStats"></div></section>

    <section><div class="stitle"><h3>Status Kepatuhan</h3><span class="note">${lapor.size}/${CW} minggu dilaporkan</span></div>
      <div class="panel"><div class="wpills">${pills}</div></div></section>

    ${dibimbing.length?`<section><div class="stitle"><h3>Sekolah Telah Dibimbing</h3><span class="note">${dibimbing.length} sekolah</span></div>
      <div class="panel" style="padding:0"><ol class="sklist">${dibimbing.slice().sort((a,b)=>a.localeCompare(b,'ms')).map(s=>`<li>${s}</li>`).join('')}</ol></div></section>`:''}

    <section><div class="stitle"><h3>Laporan Baharu</h3>
      <span class="note">Bangkit isu daripada dialog bimbingan terkini</span></div>
      <div class="panel">
        <div class="idstrip">
          <div><div class="k">PPD</div><div class="v">${me.ppd}</div></div>
          <div><div class="k">Minggu semasa</div><div class="v">Minggu ${CW}</div></div>
        </div>
        <div class="rowg">
          <div class="field"><label>Tarikh dialog <span class="req">*</span></label>
            <input id="ftarikh" type="date">
            <div class="mchip" id="mchip" style="display:none">
              <span class="big" id="mno">–</span>
              <span><span class="ml">Minggu pelaporan</span><br><span class="ms" id="msub"></span></span>
            </div></div>
          <div class="field"><label>Sekolah dibimbing <span class="req">*</span></label>
            <select id="fsekolah">
              <option value="">— Pilih sekolah —</option>
              ${skOpts}
            </select></div>
        </div>
        <div class="field"><label>Guru terlibat</label>
          <input id="fguru" type="text" placeholder="Nama guru (pilihan)"></div>

        <div class="stitle" style="margin-top:6px;padding-top:10px;border-top:1px solid var(--line)">
          <h3 style="font-size:1rem">Isu &amp; Intervensi</h3>
          <span class="note">Boleh bangkit seberapa banyak isu</span></div>
        <div id="isuList"></div>
        <button class="addbtn" id="addIsu">+ Tambah isu</button>
        <button class="btnp" id="hantarBtn">Hantar laporan</button>
      </div></section>

    <section><div class="stitle"><h3>Sejarah Laporan</h3><span class="note">${myR.length} laporan</span></div>
      <div class="panel" id="histBox"></div></section>
  </div>`;

  /* stats */
  const jIsu=myR.reduce((a,r)=>a+r.issues.length,0);
  const jSel=TINDAKAN.filter(t=>t.ppd===me.ppd&&t.status==='Selesai').length;
  $('#pStats').innerHTML=[
    {lbl:'Laporan dihantar',num:myR.length,sub:`${CW} minggu program`,cls:''},
    {lbl:'Jumlah isu dibangkit',num:jIsu,sub:'sepanjang program',cls:''},
    {lbl:'Isu diselesaikan',num:jSel,sub:'status Selesai',cls:jSel?'good':''},
    {lbl:'Minggu belum lapor',num:CW-lapor.size,sub:'minggu tercicir',cls:(CW-lapor.size)?'warn':'good'},
  ].map(c=>`<div class="stat ${c.cls}"><div class="lbl">${c.lbl}</div><div class="num">${c.num}</div><div class="sub">${c.sub}</div></div>`).join('');

  function rowH(){return `<div class="irow"><span class="rn">Isu</span><button class="rm">×</button>

      <textarea class="fi" placeholder="Nyatakan isu yang berbangkit dari dialog"></textarea></div>

  renderHist();

    if(!sekolah){toast('Sila pilih sekolah yang dibimbing.',false);$('#fsekolah').focus();return;}
    const rows=$$('.irow');const issues=[];

      const isu=r.querySelector('.fi').value.trim(),inter=r.querySelector('.fr').value.trim();

        toast(`Laporan Minggu ${m} (${issues.length} isu) dihantar. S4PD akan kelompok ke sektor.`);

      vPPD(); // render semula keseluruhan paparan PPD (stats, kepatuhan, sekolah dibimbing, sejarah)
    }finally{const b=$('#hantarBtn');if(b){b.disabled=false;b.textContent='Hantar laporan';}}
  };

  function renderHist(){
    const reps=REPORTS.filter(r=>r.ppd===ME.ppd).sort((a,b)=>b.minggu-a.minggu);
    $('#histBox').innerHTML=reps.length?reps.map(r=>`<details class="rep"><summary>

  $('#s4Stats').innerHTML=[
    {lbl:`Kepatuhan PPD Minggu ${CW}`,num:patuh,unit:'%',sub:`${PPDS.filter(p=>hasRep(p,CW)).length}/${PPDS.length} PPD dah lapor`,cls:patuh>=80?'good':(patuh<50?'warn':'')},
    {lbl:'Isu belum ditetapkan sektor',num:bt,sub:'perlu triage S4PD',cls:bt>0?'warn':'good'},
    {lbl:'Jumlah intervensi',num:tot,sub:'sepanjang program',cls:''},

function renderLedger(){
  const weeks=Array.from({length:CW},(_,i)=>i+1);

  let b='<tbody>';
  PPDS.forEach(p=>{
    b+=`<tr><td class="nm">${p}</td>`;
    weeks.forEach(w=>{
      const r=hasRep(p,w);const cur=w===CW;
      b+=`<td class="cl${cur?' cur':''}"><div class="lcell">`+
        (r?`<div class="lmark ok" data-rid="${r.id}">✓</div><div class="isuc">${r.issues.length} isu</div>`
          :`<div class="lmark no">·</div>`)+`</div></td>`;
    });
    b+='</tr>';
  });
  b+='</tbody>';

  $$('.lmark.ok').forEach(el=>el.onclick=()=>{

      <button class="tab active" data-t="dash">Dashboard</button>
      <button class="tab" data-t="users">Pengguna</button>
      <button class="tab" data-t="cfg">Tetapan</button>
    </div>
    <div id="adminPane"></div>
  </section></div>`;
  const panes={dash:()=>{cleanup();vDash(true);},users:aUsers,cfg:aCfg};
  $$('.tab[data-t]').forEach(t=>t.onclick=()=>{$$('.tab[data-t]').forEach(x=>x.classList.remove('active'));t.classList.add('active');if(t.dataset.t!=='dash')cleanup();panes[t.dataset.t]();});
  vDash(true);
}
function aUsers(){
  $('#adminPane').innerHTML=`<div class="stitle"><h3>Urus Pengguna</h3><span class="note">${USERS_DEMO.length} akaun</span></div>
    <div class="panel" style="margin-bottom:14px">
      <div class="rowg" style="grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end">
        <div class="field" style="margin:0"><label>Nama penuh</label><input id="auN" placeholder="Nama"></div>
        <div class="field" style="margin:0"><label>Username</label><input id="auU" placeholder="username"></div>
        <div class="field" style="margin:0"><label>Peranan</label>
          <select id="auR"><option value="ppd">PPD</option><option value="s4pd">S4PD</option><option value="meja">Meja Sektor</option><option value="pengurusan">Pengurusan</option><option value="admin">Admin</option></select></div>
        <button class="btnp" style="padding:10px;white-space:nowrap" id="auAdd">+ Tambah</button>
      </div></div>
    <div class="panel" style="padding:0;overflow-x:auto">
      <table class="utable" id="utbl"><thead><tr><th>Nama</th><th>Username</th><th>Peranan</th><th>PPD / Sektor</th></tr></thead>
      <tbody>${USERS_DEMO.map(u=>`<tr><td>${u.nama}</td><td>${u.u}</td><td><span class="rl">${ROLE_LBL[u.peranan]}</span></td><td>${u.ppd||u.sektor||'—'}</td></tr>`).join('')}</tbody></table></div>`;
  $('#auAdd').onclick=()=>{const n=$('#auN').value.trim(),u=$('#auU').value.trim().toLowerCase(),r=$('#auR').value;
    if(!n||!u){toast('Isi nama & username.',false);return;}
    if(USERS_DEMO.find(x=>x.u===u)){toast('Username telah wujud.',false);return;}
    USERS_DEMO.push({u,pin:'1234',nama:n,peranan:r});toast('Pengguna ditambah (PIN: 1234).');
    $('#utbl tbody').insertAdjacentHTML('beforeend',`<tr><td>${n}</td><td>${u}</td><td><span class="rl">${ROLE_LBL[r]}</span></td><td>—</td></tr>`);
    $('#auN').value='';$('#auU').value='';};
}
function aCfg(){
  $('#adminPane').innerHTML=`<div class="stitle"><h3>Tetapan Sistem</h3></div>
    <div class="panel">
      <div class="rowg">
        <div class="field"><label>Tarikh mula program</label><input type="date" value="${CFG.START}" disabled></div>
        <div class="field"><label>Minggu semasa</label><input value="Minggu ${CW}" disabled></div>
      </div>
      <div class="field"><label>10 PPD Kedah (${PPDS.length} aktif)</label>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${PPDS.map(p=>`<span class="tag">${p}</span>`).join('')}</div></div>
      <div class="field"><label>14 Sektor JPN Kedah</label>
        <div style="display:flex;flex-wrap:wrap;gap:5px">${SEKTOR.map(s=>`<span class="rl">${s}</span>`).join('')}</div></div>
      <p style="font-size:.76rem;color:var(--muted);margin-top:14px">Dalam versi live, tetapan ini diuruskan dari tab <b>Config</b> &amp; <b>Sektor</b> dalam Google Sheet.</p>
    </div>`;
}
